<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Sender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .header {
            background: white;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 10;
        }
        h1 {
            font-size: 18px;
            margin: 0;
            white-space: nowrap;
        }
        input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 8px 20px;
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #106ebe;
        }
        #browserFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            background: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Proxy</h1>
        <input type="text" id="urlInput" placeholder="Enter URL here (e.g., https://example.com)">
        <button onclick="sendURL()">Go</button>
    </div>
    <iframe id="browserFrame"></iframe>

    <script>
        function sendURL() {
            let url = document.getElementById('urlInput').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            if (!url.startsWith('http')) {
                url = 'http://' + url;
            }
            
            fetch('/api/send-url', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ url: url })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else {
                    const iframe = document.getElementById('browserFrame');
                    iframe.srcdoc = data.content;
                }
            })
            .catch(error => alert('Error: ' + error));
        }
    </script>
</body>
</html>
